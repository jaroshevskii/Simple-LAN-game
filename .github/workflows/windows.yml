name: Windows

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # The preset uses Ninja + cl, so it works on any runner image regardless
      # of the installed Visual Studio version (no hard-coded VS generator).
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      # SDL2 and libsodium are not preinstalled on the Windows runners, so the
      # CMake FetchContent fallback builds them from source automatically.
      - name: Configure
        run: cmake --preset windows

      - name: Build
        run: cmake --build --preset windows

      - name: Verify runtime files
        shell: bash
        run: ./scripts/check-runtime-files.sh build/bin

      - name: Test
        run: ctest --preset windows
