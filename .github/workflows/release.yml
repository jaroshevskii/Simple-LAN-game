name: Release

# Builds the game for each platform, verifies that the bin/ directory holds
# every runtime file (binaries, shaders, fonts, levels), then packages that
# directory as the release archive. The archive is exactly what a player
# unpacks and runs: Power + Engine/Game libraries + System/ + Data/.
#
# Windows archives are self-contained (SDL2.dll is bundled). Linux/macOS
# archives need system SDL2 + libsodium (apt/brew), same as the dev setup.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            preset: linux
            bindir: build/bin
            stem: SimpleLANGame-linux-x86_64
            archive: SimpleLANGame-linux-x86_64.tar.gz
          - name: macOS
            runner: macos-latest
            preset: macos
            bindir: build/bin
            stem: SimpleLANGame-macos-arm64
            archive: SimpleLANGame-macos-arm64.tar.gz
          - name: Windows
            runner: windows-latest
            preset: windows
            bindir: build/bin
            stem: SimpleLANGame-windows-x86_64
            archive: SimpleLANGame-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libsdl2-dev libsodium-dev libgl1-mesa-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja sdl2 libsodium

      # Windows: SDL2 + libsodium are fetched and built from source by CMake.
      # Ninja + cl needs the MSVC environment set up first.
      - name: Set up MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      # A release with a missing shader/font/level is broken at first launch -
      # fail here, not on the player's machine.
      - name: Verify runtime files
        shell: bash
        run: ./scripts/check-runtime-files.sh ${{ matrix.bindir }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

      # Package the verified bin/ directory as-is. Archiving a directory (not
      # bare binaries) keeps the executable bit through download/extraction.
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          rm -rf "${{ matrix.stem }}"
          cp -R "${{ matrix.bindir }}" "${{ matrix.stem }}"
          chmod +x "${{ matrix.stem }}/Power"
          tar -czf "dist/${{ matrix.archive }}" "${{ matrix.stem }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if (Test-Path "${{ matrix.stem }}") { Remove-Item -Recurse -Force "${{ matrix.stem }}" }
          Copy-Item -Recurse "${{ matrix.bindir }}" "${{ matrix.stem }}"
          Compress-Archive -Path "${{ matrix.stem }}" -DestinationPath "dist/${{ matrix.archive }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.archive }}
