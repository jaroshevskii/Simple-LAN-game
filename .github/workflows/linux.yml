name: Linux

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libsdl2-dev libsodium-dev \
            libgl1-mesa-dev

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux

      - name: Configure
        run: cmake --preset linux

      - name: Build
        run: cmake --build --preset linux

      - name: Verify runtime files
        run: ./scripts/check-runtime-files.sh build/bin

      - name: Test
        run: ctest --preset linux
